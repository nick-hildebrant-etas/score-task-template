version: "3"

tasks:
  install:
    desc: "Install Bitnami PostgreSQL via Helm into the postgres namespace"
    vars:
      release_name: '{{.release_name | default "postgres"}}'
      namespace: '{{.namespace | default "postgres"}}'
      chart: '{{.chart | default "bitnami/postgresql"}}'
      chart_version: '{{.chart_version | default ""}}'
      pvc_size: '{{.pvc_size | default "10Gi"}}'
    env:
      KUBECONFIG: "{{.HOME}}/.kube/config"
    preconditions:
      - sh: command -v helm >/dev/null 2>&1
        msg: "helm is not installed. Run: brew install helm"
      - sh: '[ -n "${POSTGRES_PASSWORD}" ]'
        msg: "POSTGRES_PASSWORD is not set. Run: task secrets:envgen"
    cmds:
      - |
        echo "Adding Bitnami Helm repo..."
        helm repo add bitnami https://charts.bitnami.com/bitnami 2>/dev/null || true
        helm repo update bitnami
      - |
        echo "Installing PostgreSQL (release: {{.release_name}}, namespace: {{.namespace}})..."
        CHART_VERSION="{{.chart_version}}"
        helm upgrade --install "{{.release_name}}" "{{.chart}}" \
          --namespace "{{.namespace}}" \
          --create-namespace \
          ${CHART_VERSION:+--version "$CHART_VERSION"} \
          --set auth.postgresPassword="${POSTGRES_PASSWORD}" \
          --set auth.database=platform \
          --set primary.persistence.size="{{.pvc_size}}" \
          --set primary.persistence.storageClass=local-path \
          --wait --timeout=5m
        echo "PostgreSQL installed."

  wait:
    desc: "Wait for PostgreSQL pods to be ready"
    vars:
      release_name: '{{.release_name | default "postgres"}}'
      namespace: '{{.namespace | default "postgres"}}'
      timeout: '{{.timeout | default "300s"}}'
    env:
      KUBECONFIG: "{{.HOME}}/.kube/config"
    cmds:
      - |
        echo "Waiting for PostgreSQL pods in namespace {{.namespace}}..."
        kubectl wait --for=condition=Ready pod \
          -l app.kubernetes.io/name=postgresql \
          -n "{{.namespace}}" \
          --timeout="{{.timeout}}"
        echo "PostgreSQL is ready."
        kubectl get pods -n "{{.namespace}}"

  uninstall:
    desc: "Uninstall PostgreSQL Helm release"
    vars:
      release_name: '{{.release_name | default "postgres"}}'
      namespace: '{{.namespace | default "postgres"}}'
    env:
      KUBECONFIG: "{{.HOME}}/.kube/config"
    cmds:
      - |
        echo "Uninstalling PostgreSQL release '{{.release_name}}' from namespace '{{.namespace}}'..."
        helm uninstall "{{.release_name}}" --namespace "{{.namespace}}" 2>/dev/null || \
          echo "Release '{{.release_name}}' not found — nothing to uninstall."
      - |
        echo "Removing PVCs in namespace {{.namespace}}..."
        kubectl delete pvc --all -n "{{.namespace}}" --ignore-not-found=true

  test:
    desc: "Acceptance test: psql ping from in-cluster Job; data persists across pod restart"
    vars:
      release_name: '{{.release_name | default "postgres"}}'
      namespace: '{{.namespace | default "postgres"}}'
      timeout: '{{.timeout | default "120s"}}'
    env:
      KUBECONFIG: "{{.HOME}}/.kube/config"
    cmds:
      - |
        FAILED=0
        PG_HOST="{{.release_name}}-postgresql.{{.namespace}}.svc.cluster.local"
        PG_SECRET="{{.release_name}}-postgresql"
        NS="{{.namespace}}"
        SUFFIX="$$"

        echo "=== PostgreSQL acceptance tests ==="
        echo ""

        # T1: psql ping via in-cluster Job
        echo "[T1] psql ping (SELECT 1) via in-cluster Job..."
        JOB1="pg-ping-${SUFFIX}"
        kubectl apply -f - <<EOF
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${JOB1}
          namespace: ${NS}
        spec:
          ttlSecondsAfterFinished: 60
          template:
            spec:
              restartPolicy: Never
              containers:
              - name: psql
                image: postgres:15-alpine
                env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ${PG_SECRET}
                      key: postgres-password
                command: ["psql", "-h", "${PG_HOST}", "-U", "postgres", "-d", "platform", "-c", "SELECT 1"]
        EOF
        if kubectl wait job/${JOB1} -n ${NS} --for=condition=Complete --timeout={{.timeout}} >/dev/null 2>&1; then
          echo "  [PASS] psql ping succeeded"
        else
          echo "  [FAIL] psql ping job did not complete"
          kubectl logs -l job-name=${JOB1} -n ${NS} 2>/dev/null || true
          FAILED=1
        fi
        kubectl delete job/${JOB1} -n ${NS} --ignore-not-found=true >/dev/null 2>&1

        # T2: Data persists across pod restart
        echo ""
        echo "[T2] Data persistence across pod restart..."

        JOB2="pg-write-${SUFFIX}"
        kubectl apply -f - <<EOF
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${JOB2}
          namespace: ${NS}
        spec:
          ttlSecondsAfterFinished: 60
          template:
            spec:
              restartPolicy: Never
              containers:
              - name: psql
                image: postgres:15-alpine
                env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ${PG_SECRET}
                      key: postgres-password
                command:
                - psql
                - "-h"
                - "${PG_HOST}"
                - "-U"
                - postgres
                - "-d"
                - platform
                - "-c"
                - "CREATE TABLE IF NOT EXISTS persistence_test (id SERIAL PRIMARY KEY, marker TEXT); INSERT INTO persistence_test (marker) VALUES ('f03-test');"
        EOF
        if kubectl wait job/${JOB2} -n ${NS} --for=condition=Complete --timeout={{.timeout}} >/dev/null 2>&1; then
          echo "  Write job succeeded"
        else
          echo "  [FAIL] Write job did not complete"
          kubectl logs -l job-name=${JOB2} -n ${NS} 2>/dev/null || true
          FAILED=1
        fi
        kubectl delete job/${JOB2} -n ${NS} --ignore-not-found=true >/dev/null 2>&1

        echo "  Restarting PostgreSQL pod..."
        kubectl delete pod -l app.kubernetes.io/name=postgresql -n ${NS} --wait=false
        sleep 2
        kubectl wait --for=condition=Ready pod -l app.kubernetes.io/name=postgresql -n ${NS} --timeout={{.timeout}}

        JOB3="pg-verify-${SUFFIX}"
        kubectl apply -f - <<EOF
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${JOB3}
          namespace: ${NS}
        spec:
          ttlSecondsAfterFinished: 60
          template:
            spec:
              restartPolicy: Never
              containers:
              - name: psql
                image: postgres:15-alpine
                env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ${PG_SECRET}
                      key: postgres-password
                command:
                - psql
                - "-h"
                - "${PG_HOST}"
                - "-U"
                - postgres
                - "-d"
                - platform
                - "-t"
                - "-c"
                - "SELECT COUNT(*) FROM persistence_test WHERE marker = 'f03-test';"
        EOF
        if kubectl wait job/${JOB3} -n ${NS} --for=condition=Complete --timeout={{.timeout}} >/dev/null 2>&1; then
          COUNT=$(kubectl logs -l job-name=${JOB3} -n ${NS} 2>/dev/null | tr -d ' \n' || echo "0")
          if [ "${COUNT:-0}" -ge 1 ] 2>/dev/null; then
            echo "  [PASS] Data persisted after pod restart (count: ${COUNT})"
          else
            echo "  [FAIL] Data not found after pod restart (count: ${COUNT})"
            FAILED=1
          fi
        else
          echo "  [FAIL] Verify job did not complete"
          kubectl logs -l job-name=${JOB3} -n ${NS} 2>/dev/null || true
          FAILED=1
        fi
        kubectl delete job/${JOB3} -n ${NS} --ignore-not-found=true >/dev/null 2>&1

        echo ""
        if [ "$FAILED" -eq 0 ]; then
          echo "All PostgreSQL tests passed."
        else
          echo "Some PostgreSQL tests failed."
          exit 1
        fi
