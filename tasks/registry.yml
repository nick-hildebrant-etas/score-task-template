version: "3"

tasks:
  install:
    desc: "Deploy registry:2 OCI image registry in the registry namespace"
    vars:
      namespace: '{{.namespace | default "registry"}}'
      storage_size: '{{.storage_size | default "20Gi"}}'
    env:
      KUBECONFIG: "{{.HOME}}/.kube/config"
    preconditions:
      - sh: '[ -n "${REGISTRY_PORT}" ]'
        msg: "REGISTRY_PORT is not set. Run: task secrets:envgen"
    cmds:
      - |
        echo "Deploying registry:2 (namespace: {{.namespace}}, port: ${REGISTRY_PORT})..."
        kubectl apply -f - <<EOF
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: registry-data
          namespace: {{.namespace}}
        spec:
          accessModes: [ReadWriteOnce]
          storageClassName: local-path
          resources:
            requests:
              storage: {{.storage_size}}
        ---
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: registry
          namespace: {{.namespace}}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: registry
          template:
            metadata:
              labels:
                app: registry
            spec:
              containers:
              - name: registry
                image: registry:2
                ports:
                - containerPort: 5000
                  hostPort: ${REGISTRY_PORT}
                env:
                - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
                  value: /var/lib/registry
                - name: REGISTRY_HTTP_ADDR
                  value: ":5000"
                resources:
                  requests:
                    cpu: "50m"
                    memory: "64Mi"
                  limits:
                    cpu: "500m"
                    memory: "256Mi"
                volumeMounts:
                - name: data
                  mountPath: /var/lib/registry
                readinessProbe:
                  httpGet:
                    path: /v2/
                    port: 5000
                  initialDelaySeconds: 3
                  periodSeconds: 5
              volumes:
              - name: data
                persistentVolumeClaim:
                  claimName: registry-data
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: registry-svc
          namespace: {{.namespace}}
        spec:
          selector:
            app: registry
          ports:
          - port: 5000
            targetPort: 5000
        EOF
        echo "registry:2 deployed."

  wait:
    desc: "Wait for registry pod to be Ready"
    vars:
      namespace: '{{.namespace | default "registry"}}'
    env:
      KUBECONFIG: "{{.HOME}}/.kube/config"
    cmds:
      - |
        echo "Waiting for registry pod..."
        until kubectl wait deployment/registry -n "{{.namespace}}" \
            --for=condition=Available --timeout=20s 2>/dev/null; do
          sleep 5
        done
        echo "Registry is ready."
        kubectl get pods -n "{{.namespace}}"

  uninstall:
    desc: "Remove registry deployment and PVC"
    vars:
      namespace: '{{.namespace | default "registry"}}'
    env:
      KUBECONFIG: "{{.HOME}}/.kube/config"
    cmds:
      - |
        kubectl delete deployment/registry service/registry-svc \
          -n "{{.namespace}}" --ignore-not-found=true
        kubectl delete pvc/registry-data -n "{{.namespace}}" --ignore-not-found=true
        echo "Registry removed."

  test:
    desc: "Acceptance test: /v2/ returns {}; push/pull round-trip from Lima VM verifies digest"
    vars:
      namespace: '{{.namespace | default "registry"}}'
      local_port: '{{.local_port | default "15000"}}'
      vm_name: '{{.vm_name | default "k3s"}}'
      source_image: '{{.source_image | default "docker.io/library/busybox:1.36"}}'
    env:
      KUBECONFIG: "{{.HOME}}/.kube/config"
    preconditions:
      - sh: '[ -n "${REGISTRY_PORT}" ]'
        msg: "REGISTRY_PORT is not set. Run: task secrets:envgen"
      - sh: command -v limactl >/dev/null 2>&1
        msg: "limactl is not installed. Run: brew install lima"
    cmds:
      - |
        FAILED=0
        NS="{{.namespace}}"
        LOCAL_PORT="{{.local_port}}"
        VM="{{.vm_name}}"
        SOURCE="{{.source_image}}"
        TEST_REF="localhost:${REGISTRY_PORT}/test/busybox:acceptance"

        echo "=== registry:2 acceptance tests ==="
        echo ""

        # T1: /v2/ returns {}
        echo "[T1] /v2/ returns {}..."
        # Kill any stale port-forward on this port before starting
        lsof -ti tcp:"${LOCAL_PORT}" | xargs kill -9 2>/dev/null || true
        sleep 1
        kubectl port-forward svc/registry-svc "${LOCAL_PORT}:5000" -n "${NS}" >/dev/null 2>&1 &
        PF_PID=$!
        sleep 3
        RESPONSE=$(curl -sf "http://localhost:${LOCAL_PORT}/v2/" 2>/dev/null || echo "error")
        if echo "${RESPONSE}" | grep -q "{}"; then
          echo "  [PASS] /v2/ returned {}"
        else
          echo "  [FAIL] /v2/ did not return {} (got: ${RESPONSE})"
          FAILED=1
        fi
        kill "${PF_PID}" 2>/dev/null || true
        sleep 1

        # T2: Push/pull round-trip from Lima VM using k3s ctr
        # k3s ctr can't push multi-arch indexes (missing non-ARM blobs), so we
        # resolve the linux/arm64 single-platform manifest digest and work with that.
        echo ""
        echo "[T2] Push/pull round-trip from Lima VM (${VM})..."

        # Ensure source image is present
        limactl shell "${VM}" -- sudo k3s ctr images pull "${SOURCE}" >/dev/null 2>&1 || true

        # Get the arm64 single-platform manifest digest from the index
        INDEX_DIGEST=$(limactl shell "${VM}" -- sudo k3s ctr images ls 2>/dev/null | \
          awk -v img="${SOURCE}" '$1==img {print $3}')
        ARM64_DIGEST=$(limactl shell "${VM}" -- sudo k3s ctr content get "${INDEX_DIGEST}" 2>/dev/null | \
          jq -r '.manifests[] | select(.platform.architecture == "arm64") | .digest' 2>/dev/null | head -1)

        if [ -z "${ARM64_DIGEST}" ]; then
          # Source is already a single-platform manifest
          ARM64_DIGEST="${INDEX_DIGEST}"
        fi

        # Pull by digest to create a named single-platform reference
        ARM64_REF="${SOURCE%:*}@${ARM64_DIGEST}"
        limactl shell "${VM}" -- sudo k3s ctr images pull "${ARM64_REF}" >/dev/null 2>&1 || true

        # Tag and push
        limactl shell "${VM}" -- sudo k3s ctr images tag "${ARM64_REF}" "${TEST_REF}" 2>/dev/null
        limactl shell "${VM}" -- sudo k3s ctr images push --plain-http "${TEST_REF}" >/dev/null 2>&1

        # Remove local copy and pull back to confirm round-trip
        limactl shell "${VM}" -- sudo k3s ctr images rm "${TEST_REF}" >/dev/null 2>&1 || true
        if limactl shell "${VM}" -- sudo k3s ctr images pull --plain-http "${TEST_REF}" >/dev/null 2>&1; then
          PULLED_DIGEST=$(limactl shell "${VM}" -- sudo k3s ctr images ls 2>/dev/null | \
            awk -v ref="${TEST_REF}" '$1==ref {print $3}')
          echo "  [PASS] Push and pull succeeded (digest: ${PULLED_DIGEST})"
          limactl shell "${VM}" -- sudo k3s ctr images rm "${TEST_REF}" >/dev/null 2>&1 || true
        else
          echo "  [FAIL] Pull from registry failed"
          FAILED=1
        fi

        echo ""
        if [ "${FAILED}" -eq 0 ]; then
          echo "All registry tests passed."
        else
          echo "Some registry tests failed."
          exit 1
        fi
