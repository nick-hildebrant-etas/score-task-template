version: "3"

tasks:
  install:
    desc: "Deploy registry:2 OCI image registry in the registry namespace"
    vars:
      namespace: '{{.namespace | default "registry"}}'
      storage_size: '{{.storage_size | default "20Gi"}}'
    env:
      KUBECONFIG: "{{.HOME}}/.kube/config"
    preconditions:
      - sh: '[ -n "${REGISTRY_PORT}" ]'
        msg: "REGISTRY_PORT is not set. Run: task secrets:envgen"
    cmds:
      - |
        echo "Deploying registry:2 (namespace: {{.namespace}}, port: ${REGISTRY_PORT})..."
        kubectl apply -f - <<EOF
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: registry-data
          namespace: {{.namespace}}
        spec:
          accessModes: [ReadWriteOnce]
          storageClassName: local-path
          resources:
            requests:
              storage: {{.storage_size}}
        ---
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: registry
          namespace: {{.namespace}}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: registry
          template:
            metadata:
              labels:
                app: registry
            spec:
              containers:
              - name: registry
                image: registry:2
                ports:
                - containerPort: 5000
                  hostPort: ${REGISTRY_PORT}
                env:
                - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
                  value: /var/lib/registry
                - name: REGISTRY_HTTP_ADDR
                  value: ":5000"
                resources:
                  requests:
                    cpu: "50m"
                    memory: "64Mi"
                  limits:
                    cpu: "500m"
                    memory: "256Mi"
                volumeMounts:
                - name: data
                  mountPath: /var/lib/registry
                readinessProbe:
                  httpGet:
                    path: /v2/
                    port: 5000
                  initialDelaySeconds: 3
                  periodSeconds: 5
              volumes:
              - name: data
                persistentVolumeClaim:
                  claimName: registry-data
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: registry-svc
          namespace: {{.namespace}}
        spec:
          selector:
            app: registry
          ports:
          - port: 5000
            targetPort: 5000
        EOF
        echo "registry:2 deployed."

  wait:
    desc: "Wait for registry pod to be Ready"
    vars:
      namespace: '{{.namespace | default "registry"}}'
    env:
      KUBECONFIG: "{{.HOME}}/.kube/config"
    cmds:
      - |
        echo "Waiting for registry pod..."
        until kubectl wait deployment/registry -n "{{.namespace}}" \
            --for=condition=Available --timeout=20s 2>/dev/null; do
          sleep 5
        done
        echo "Registry is ready."
        kubectl get pods -n "{{.namespace}}"

  uninstall:
    desc: "Remove registry deployment and PVC"
    vars:
      namespace: '{{.namespace | default "registry"}}'
    env:
      KUBECONFIG: "{{.HOME}}/.kube/config"
    cmds:
      - |
        kubectl delete deployment/registry service/registry-svc \
          -n "{{.namespace}}" --ignore-not-found=true
        kubectl delete pvc/registry-data -n "{{.namespace}}" --ignore-not-found=true
        echo "Registry removed."

  test:
    desc: "Acceptance test: /v2/ returns {}; push/pull round-trip from Lima VM verifies digest"
    vars:
      namespace: '{{.namespace | default "registry"}}'
      local_port: '{{.local_port | default "15000"}}'
      vm_name: '{{.vm_name | default "k3s"}}'
      test_image: '{{.test_image | default "busybox:1.36"}'
    env:
      KUBECONFIG: "{{.HOME}}/.kube/config"
    preconditions:
      - sh: '[ -n "${REGISTRY_PORT}" ]'
        msg: "REGISTRY_PORT is not set. Run: task secrets:envgen"
      - sh: command -v limactl >/dev/null 2>&1
        msg: "limactl is not installed. Run: brew install lima"
    cmds:
      - |
        FAILED=0
        NS="{{.namespace}}"
        LOCAL_PORT="{{.local_port}}"

        echo "=== registry:2 acceptance tests ==="
        echo ""

        # T1: /v2/ returns {}
        echo "[T1] /v2/ returns {}..."
        kubectl port-forward svc/registry-svc "${LOCAL_PORT}:5000" -n "${NS}" >/dev/null 2>&1 &
        PF_PID=$!
        sleep 3

        RESPONSE=$(curl -sf "http://localhost:${LOCAL_PORT}/v2/" 2>/dev/null || echo "error")
        if echo "${RESPONSE}" | grep -q "{}"; then
          echo "  [PASS] /v2/ returned {}"
        else
          echo "  [FAIL] /v2/ did not return {} (got: ${RESPONSE})"
          FAILED=1
        fi

        kill "${PF_PID}" 2>/dev/null || true
        sleep 1

        # T2: Push/pull round-trip from Lima VM
        echo ""
        echo "[T2] Push/pull round-trip from Lima VM ({{.vm_name}})..."
        REGISTRY_ADDR="localhost:${REGISTRY_PORT}"
        TEST_REF="${REGISTRY_ADDR}/test/busybox:acceptance"

        limactl shell "{{.vm_name}}" -- sudo nerdctl pull "{{.test_image}}" 2>/dev/null || {
          echo "  [WARN] Could not pull {{.test_image}} — checking if already present..."
        }

        PUSH_DIGEST=$(limactl shell "{{.vm_name}}" -- bash -c "
          sudo nerdctl tag '{{.test_image}}' '${TEST_REF}' &&
          sudo nerdctl push --insecure-registry '${TEST_REF}' 2>&1 | grep -i 'digest:' | awk '{print \$NF}' || echo ''
        " 2>/dev/null)

        if limactl shell "{{.vm_name}}" -- sudo nerdctl rmi "${TEST_REF}" >/dev/null 2>&1 && \
           limactl shell "{{.vm_name}}" -- sudo nerdctl pull --insecure-registry "${TEST_REF}" >/dev/null 2>&1; then
          PULL_DIGEST=$(limactl shell "{{.vm_name}}" -- sudo nerdctl inspect "${TEST_REF}" \
            --format '{{`{{index .RepoDigests 0}}`}}' 2>/dev/null || echo "")
          echo "  [PASS] Push and pull succeeded"
          if [ -n "${PUSH_DIGEST}" ] && [ -n "${PULL_DIGEST}" ]; then
            echo "  [INFO] Digest: ${PULL_DIGEST}"
          fi
          # cleanup
          limactl shell "{{.vm_name}}" -- sudo nerdctl rmi "${TEST_REF}" >/dev/null 2>&1 || true
        else
          echo "  [FAIL] Push/pull round-trip failed"
          FAILED=1
        fi

        echo ""
        if [ "${FAILED}" -eq 0 ]; then
          echo "All registry tests passed."
        else
          echo "Some registry tests failed."
          exit 1
        fi
