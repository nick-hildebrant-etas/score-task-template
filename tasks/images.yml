version: "3"

tasks:
  build-worker:
    desc: "Build Alpine ARM64 worker image for Buildbarn"
    vars:
      image_name: '{{.image_name | default "arm64-worker"}}'
      image_tag: '{{.image_tag | default "latest"}}'
      dockerfile_dir: '{{.dockerfile_dir | default (printf "%s/.score-task/images/worker" .HOME)}}'
      base_image: '{{.base_image | default "arm64v8/alpine:3.19"}}'
    cmds:
      - mkdir -p "{{.dockerfile_dir}}"
      - |
        cat > "{{.dockerfile_dir}}/Dockerfile" <<'DOCKERFILE'
        FROM arm64v8/alpine:3.19

        RUN apk add --no-cache \
            bash \
            curl \
            git \
            openjdk21-jre \
            python3 \
            py3-pip \
            cargo \
            && rm -rf /var/cache/apk/*

        # Verify arch at build time
        RUN uname -m | grep -q aarch64 || (echo "ERROR: not arm64" && exit 1)

        WORKDIR /work
        DOCKERFILE
      - |
        echo "Building worker image {{.image_name}}:{{.image_tag}}..."
        docker build \
          --platform linux/arm64 \
          -t "{{.image_name}}:{{.image_tag}}" \
          "{{.dockerfile_dir}}"
        echo "Image built: {{.image_name}}:{{.image_tag}}"

  push-worker:
    desc: "Push worker image to Nexus Docker registry"
    vars:
      image_name: '{{.image_name | default "arm64-worker"}}'
      image_tag: '{{.image_tag | default "latest"}}'
      nexus_host: '{{.nexus_host | default "localhost"}}'
    preconditions:
      - sh: '[ -n "${NEXUS_DOCKER_PORT}" ]'
        msg: "NEXUS_DOCKER_PORT is not set. Run: task secrets:envgen"
      - sh: '[ -n "${NEXUS_ADMIN_PASSWORD}" ]'
        msg: "NEXUS_ADMIN_PASSWORD is not set. Run: task secrets:envgen"
    cmds:
      - |
        REGISTRY="{{.nexus_host}}:${NEXUS_DOCKER_PORT}"
        REMOTE_IMAGE="${REGISTRY}/{{.image_name}}:{{.image_tag}}"

        echo "Logging into Nexus Docker registry at ${REGISTRY}..."
        echo "${NEXUS_ADMIN_PASSWORD}" | docker login "${REGISTRY}" -u admin --password-stdin

        echo "Tagging {{.image_name}}:{{.image_tag}} -> ${REMOTE_IMAGE}..."
        docker tag "{{.image_name}}:{{.image_tag}}" "${REMOTE_IMAGE}"

        echo "Pushing ${REMOTE_IMAGE}..."
        docker push "${REMOTE_IMAGE}"
        echo "Image pushed: ${REMOTE_IMAGE}"

  list:
    desc: "List worker images in local Docker and Nexus registry"
    vars:
      image_name: '{{.image_name | default "arm64-worker"}}'
      nexus_host: '{{.nexus_host | default "localhost"}}'
    cmds:
      - |
        echo "=== Local Docker images ({{.image_name}}) ==="
        docker images "{{.image_name}}" || echo "(docker unavailable)"
      - |
        echo ""
        echo "TODO: implement — list images in Nexus Docker registry"
        echo "images:list (Nexus) is a stub"

  test:
    desc: "Test that worker image runs and has expected tools"
    vars:
      image_name: '{{.image_name | default "arm64-worker"}}'
      image_tag: '{{.image_tag | default "latest"}}'
    cmds:
      - |
        echo "TODO: implement — run worker image and verify tools are present"
        echo ""
        echo "This task should:"
        echo "  1. docker run --rm --platform linux/arm64 {{.image_name}}:{{.image_tag}} bash --version"
        echo "  2. Verify java, python3, cargo are present"
        echo "  3. Verify uname -m returns aarch64"
        echo ""
        echo "images:test is a stub"
