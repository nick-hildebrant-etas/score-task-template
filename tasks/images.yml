version: "3"

tasks:
  build-worker:
    desc: "Build Alpine ARM64 worker image for Buildbarn"
    vars:
      image_name: '{{.image_name | default "arm64-worker"}}'
      image_tag: '{{.image_tag | default "latest"}}'
      dockerfile_dir: '{{.dockerfile_dir | default (printf "%s/.score-task/images/worker" .HOME)}}'
      base_image: '{{.base_image | default "arm64v8/alpine:3.19"}}'
    cmds:
      - mkdir -p "{{.dockerfile_dir}}"
      - |
        cat > "{{.dockerfile_dir}}/Dockerfile" <<'DOCKERFILE'
        FROM arm64v8/alpine:3.19

        RUN apk add --no-cache \
            bash \
            curl \
            git \
            openjdk21-jre \
            python3 \
            py3-pip \
            cargo \
            && rm -rf /var/cache/apk/*

        # Verify arch at build time
        RUN uname -m | grep -q aarch64 || (echo "ERROR: not arm64" && exit 1)

        WORKDIR /work
        DOCKERFILE
      - |
        echo "Building worker image {{.image_name}}:{{.image_tag}}..."
        docker build \
          --platform linux/arm64 \
          -t "{{.image_name}}:{{.image_tag}}" \
          "{{.dockerfile_dir}}"
        echo "Image built: {{.image_name}}:{{.image_tag}}"

  push-worker:
    desc: "Push worker image to registry:2 OCI registry"
    vars:
      image_name: '{{.image_name | default "build-worker"}}'
      image_tag: '{{.image_tag | default "alpine-arm64"}}'
      registry_host: '{{.registry_host | default "localhost"}}'
      vm_name: '{{.vm_name | default "k3s"}}'
    preconditions:
      - sh: '[ -n "${REGISTRY_PORT}" ]'
        msg: "REGISTRY_PORT is not set. Run: task secrets:envgen"
      - sh: command -v limactl >/dev/null 2>&1
        msg: "limactl is not installed. Run: brew install lima"
    cmds:
      - |
        REGISTRY="{{.registry_host}}:${REGISTRY_PORT}"
        REMOTE_IMAGE="${REGISTRY}/{{.image_name}}:{{.image_tag}}"
        LOCAL_REF="{{.image_name}}:{{.image_tag}}"

        echo "Pushing ${LOCAL_REF} to registry:2 at ${REGISTRY}..."
        limactl shell "{{.vm_name}}" -- sudo k3s ctr images tag "${LOCAL_REF}" "${REMOTE_IMAGE}"
        limactl shell "{{.vm_name}}" -- sudo k3s ctr images push --plain-http "${REMOTE_IMAGE}"
        echo "Image pushed: ${REMOTE_IMAGE}"

  list:
    desc: "List worker images in registry:2"
    vars:
      image_name: '{{.image_name | default "build-worker"}}'
      registry_host: '{{.registry_host | default "localhost"}}'
      local_port: '{{.local_port | default "15000"}}'
    env:
      KUBECONFIG: "{{.HOME}}/.kube/config"
    cmds:
      - |
        kubectl port-forward svc/registry-svc "${local_port}:5000" -n registry >/dev/null 2>&1 &
        PF_PID=$!
        sleep 2
        echo "=== Images in registry:2 ==="
        curl -sf "http://localhost:${local_port}/v2/_catalog" 2>/dev/null || echo "(registry unreachable)"
        kill "${PF_PID}" 2>/dev/null || true

  test:
    desc: "Acceptance test: worker image exists in registry:2; uname -m returns aarch64"
    vars:
      image_name: '{{.image_name | default "build-worker"}}'
      image_tag: '{{.image_tag | default "alpine-arm64"}}'
      vm_name: '{{.vm_name | default "k3s"}}'
    preconditions:
      - sh: '[ -n "${REGISTRY_PORT}" ]'
        msg: "REGISTRY_PORT is not set. Run: task secrets:envgen"
      - sh: command -v limactl >/dev/null 2>&1
        msg: "limactl is not installed. Run: brew install lima"
    cmds:
      - |
        FAILED=0
        REGISTRY="localhost:${REGISTRY_PORT}"
        IMAGE="${REGISTRY}/{{.image_name}}:{{.image_tag}}"

        echo "=== Worker image acceptance tests ==="
        echo ""

        echo "[T1] Pull worker image from registry:2..."
        if limactl shell "{{.vm_name}}" -- sudo k3s ctr images pull --plain-http "${IMAGE}" >/dev/null 2>&1; then
          echo "  [PASS] Pull succeeded: ${IMAGE}"
        else
          echo "  [FAIL] Could not pull ${IMAGE}"
          FAILED=1
        fi

        echo "[T2] uname -m returns aarch64..."
        ARCH=$(limactl shell "{{.vm_name}}" -- sudo k3s ctr run --rm "${IMAGE}" test-arch uname -m 2>/dev/null || echo "error")
        if [ "${ARCH}" = "aarch64" ]; then
          echo "  [PASS] uname -m: ${ARCH}"
        else
          echo "  [FAIL] uname -m: ${ARCH} (expected aarch64)"
          FAILED=1
        fi

        echo ""
        if [ "${FAILED}" -eq 0 ]; then
          echo "All image tests passed."
        else
          echo "Some image tests failed."
          exit 1
        fi
