version: "3"

tasks:
  install:
    desc: "Install Sonatype Nexus Repository Manager via Helm"
    vars:
      release_name: '{{.release_name | default "nexus"}}'
      namespace: '{{.namespace | default "nexus"}}'
      chart: '{{.chart | default "sonatype/nxrm-ha"}}'
      chart_version: '{{.chart_version | default ""}}'
      pvc_size: '{{.pvc_size | default "50Gi"}}'
    env:
      KUBECONFIG: "{{.HOME}}/.kube/config"
    preconditions:
      - sh: command -v helm >/dev/null 2>&1
        msg: "helm is not installed. Run: brew install helm"
      - sh: '[ -n "${NEXUS_ADMIN_PASSWORD}" ]'
        msg: "NEXUS_ADMIN_PASSWORD is not set. Run: task secrets:envgen"
      - sh: '[ -n "${NEXUS_DOCKER_PORT}" ]'
        msg: "NEXUS_DOCKER_PORT is not set. Run: task secrets:envgen"
    cmds:
      - |
        echo "Adding Sonatype Helm repo..."
        helm repo add sonatype https://sonatype.github.io/helm3-charts/ 2>/dev/null || true
        helm repo update sonatype
      - |
        echo "Installing Nexus (release: {{.release_name}}, namespace: {{.namespace}})..."
        helm upgrade --install "{{.release_name}}" "{{.chart}}" \
          --namespace "{{.namespace}}" \
          --create-namespace \
          {{if .chart_version}}--version "{{.chart_version}}" \{{end}}
          --set nexus.docker.enabled=true \
          --set nexus.docker.port="${NEXUS_DOCKER_PORT}" \
          --set nexus.env.nexusAdminPassword="${NEXUS_ADMIN_PASSWORD}" \
          --set persistence.storageSize="{{.pvc_size}}" \
          --set persistence.storageClassName=local-path \
          --wait --timeout=10m
        echo "Nexus installed."

  wait:
    desc: "Wait for Nexus pods to be ready"
    vars:
      namespace: '{{.namespace | default "nexus"}}'
      timeout: '{{.timeout | default "600s"}}'
    env:
      KUBECONFIG: "{{.HOME}}/.kube/config"
    cmds:
      - |
        echo "Waiting for Nexus pods in namespace {{.namespace}} (timeout: {{.timeout}})..."
        kubectl wait --for=condition=Ready pod \
          -l app=nxrm-ha \
          -n "{{.namespace}}" \
          --timeout="{{.timeout}}"
        echo "Nexus is ready."
        kubectl get pods -n "{{.namespace}}"

  uninstall:
    desc: "Uninstall Nexus Helm release"
    vars:
      release_name: '{{.release_name | default "nexus"}}'
      namespace: '{{.namespace | default "nexus"}}'
    env:
      KUBECONFIG: "{{.HOME}}/.kube/config"
    cmds:
      - |
        echo "Uninstalling Nexus release '{{.release_name}}' from namespace '{{.namespace}}'..."
        helm uninstall "{{.release_name}}" --namespace "{{.namespace}}" 2>/dev/null || \
          echo "Release '{{.release_name}}' not found — nothing to uninstall."
      - |
        echo "Removing PVCs in namespace {{.namespace}}..."
        kubectl delete pvc --all -n "{{.namespace}}" --ignore-not-found=true

  configure:
    desc: "Configure Nexus repos and Docker registry via REST API"
    vars:
      namespace: '{{.namespace | default "nexus"}}'
      nexus_url: '{{.nexus_url | default "http://localhost:8081"}}'
    env:
      KUBECONFIG: "{{.HOME}}/.kube/config"
    cmds:
      - |
        echo "TODO: implement — configure Nexus repos via REST API"
        echo ""
        echo "This task should:"
        echo "  1. Create a Maven proxy repo pointing to Maven Central"
        echo "  2. Create a Maven hosted repo for build artifacts"
        echo "  3. Create a Docker hosted registry on \$NEXUS_DOCKER_PORT"
        echo "  4. Create a raw hosted repo for toolchain artifacts"
        echo ""
        echo "nexus:configure is a stub"
        # TODO: use curl with NEXUS_ADMIN_PASSWORD to POST to /service/rest/v1/repositories

  list-repos:
    desc: "List Nexus repositories via REST API"
    vars:
      nexus_url: '{{.nexus_url | default "http://localhost:8081"}}'
    cmds:
      - |
        echo "TODO: implement — list Nexus repos via REST API"
        # TODO: curl -u "admin:${NEXUS_ADMIN_PASSWORD}" "${nexus_url}/service/rest/v1/repositories"

  test-up:
    desc: "Smoke test: Nexus REST API responds"
    vars:
      namespace: '{{.namespace | default "nexus"}}'
      nexus_url: '{{.nexus_url | default "http://localhost:8081"}}'
    cmds:
      - |
        echo "TODO: implement — test that Nexus REST API returns 200"
        echo "nexus:test-up is a stub"
        # TODO: curl -sf "${nexus_url}/service/rest/v1/status" && echo "[PASS] Nexus is up"

  test-repos:
    desc: "Test that expected Nexus repos exist"
    vars:
      nexus_url: '{{.nexus_url | default "http://localhost:8081"}}'
    cmds:
      - |
        echo "TODO: implement — verify expected repos exist in Nexus"
