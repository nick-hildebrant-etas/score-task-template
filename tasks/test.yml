version: "3"

tasks:
  smoke:
    desc: "Run all completed milestone acceptance tests in order"
    env:
      KUBECONFIG: "{{.HOME}}/.kube/config"
    cmds:
      - |
        echo "========================================"
        echo " ARM build platform — smoke test suite"
        echo "========================================"
        echo ""
      - task: _run
        vars: { label: "F-00 · Claude Code install", t: "tools:test-claude" }
      - task: _run
        vars: { label: "F-01 · K3s node ready", t: "k3s:test" }
      - task: _run
        vars: { label: "F-02 · Namespaces & storage", t: "storage:test" }
      - task: _run
        vars: { label: "F-03 · nginx proxy (PyPI/Cargo/BCR)", t: "proxy:test" }
      - task: _run
        vars: { label: "F-04 · OCI registry", t: "registry:test" }
      - task: _run
        vars: { label: "F-05 · Dep list generation", t: "deps:test-collect" }
      - |
        echo ""
        echo "All smoke tests passed."

  _run:
    internal: true
    vars:
      label: '{{.label}}'
      t: '{{.t}}'
    cmds:
      - |
        echo "--- {{.label}} ---"
        if task {{.t}} >/tmp/smoke-out 2>&1; then
          echo "[PASS] {{.label}}"
        else
          echo "[FAIL] {{.label}}"
          cat /tmp/smoke-out
          exit 1
        fi
        echo ""

  matrix-smoke:
    desc: "Run smoke tests across multiple build configurations"
    vars:
      configs_file: '{{.configs_file | default (printf "%s/.score-task/test/matrix-configs.yml" .HOME)}}'
    cmds:
      - |
        echo "TODO: implement — run test matrix against multiple build configs"
        echo ""
        echo "This task should:"
        echo "  1. Read matrix configurations from {{.configs_file}}"
        echo "  2. For each config, submit a sample build job via Buildbarn RBE"
        echo "  3. Collect and report results"
        echo ""
        echo "test:matrix-smoke is a stub"

  collect-results:
    desc: "Collect test results from all test runs"
    vars:
      results_dir: '{{.results_dir | default (printf "%s/.score-task/test/results" .HOME)}}'
    cmds:
      - mkdir -p "{{.results_dir}}"
      - |
        echo "TODO: implement — collect JUnit/JSON test results from cluster"
        echo "test:collect-results is a stub"

  report:
    desc: "Generate a test report from collected results"
    vars:
      results_dir: '{{.results_dir | default (printf "%s/.score-task/test/results" .HOME)}}'
      report_file: '{{.report_file | default (printf "%s/.score-task/test/report.html" .HOME)}}'
    cmds:
      - |
        echo "TODO: implement — generate HTML/Markdown report from {{.results_dir}}"
        echo "test:report is a stub"

  test-matrix:
    desc: "Run the full test matrix end-to-end and produce a report"
    cmds:
      - task: matrix-smoke
      - task: collect-results
      - task: report
