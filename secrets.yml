version: "3"

tasks:
  doctor:
    desc: "Check all secrets prerequisites and report issues"
    vars:
      age_key_file: '{{.age_key_file | default (printf "%s/.config/sops/age/keys.txt" .HOME)}}'
      age_key_dir: '{{.age_key_dir | default (printf "%s/.config/sops/age" .HOME)}}'
      vault_file: '{{.vault_file | default (printf "%s/.score-task/vault.sops.yaml" .HOME)}}'
      sops_config: '{{.sops_config | default (printf "%s/.score-task/.sops.yaml" .HOME)}}'
    cmds:
      - |
        FAILED=0

        echo "=== Secrets prerequisites check ==="
        echo ""

        # Check age installed
        if ! command -v age >/dev/null 2>&1; then
          echo "[FAIL] age is not installed"
          echo "       Fix: brew install age"
          FAILED=1
        else
          echo "[OK]   age is installed ($(age --version 2>&1 | head -1))"
        fi

        # Check sops installed
        if ! command -v sops >/dev/null 2>&1; then
          echo "[FAIL] sops is not installed"
          echo "       Fix: brew install sops"
          FAILED=1
        else
          echo "[OK]   sops is installed ($(sops --version 2>&1 | head -1))"
        fi

        # Check yq installed
        if ! command -v yq >/dev/null 2>&1; then
          echo "[FAIL] yq is not installed"
          echo "       Fix: brew install yq"
          FAILED=1
        else
          echo "[OK]   yq is installed ($(yq --version 2>&1 | head -1))"
        fi

        # Check age private key exists
        if [ ! -f "{{.age_key_file}}" ]; then
          echo "[FAIL] age private key not found at {{.age_key_file}}"
          echo "       Fix: restore from backup or run: task secrets:keygen"
          FAILED=1
        else
          echo "[OK]   age private key found at {{.age_key_file}}"
        fi

        # Check .sops.yaml is not a placeholder
        if [ ! -f "{{.sops_config}}" ]; then
          echo "[FAIL] .sops.yaml not found at {{.sops_config}}"
          echo "       Fix: ensure {{.sops_config}} exists with your age public key"
          FAILED=1
        elif grep -q "age1REPLACEME" "{{.sops_config}}"; then
          echo "[FAIL] .sops.yaml contains placeholder key (age1REPLACEME)"
          echo "       Fix: run 'task secrets:keygen' and update {{.sops_config}} with the printed public key"
          FAILED=1
        else
          echo "[OK]   .sops.yaml is configured"
        fi

        # Check vault.sops.yaml exists and is encrypted
        if [ ! -f "{{.vault_file}}" ]; then
          echo "[FAIL] vault.sops.yaml not found at {{.vault_file}}"
          echo "       Fix: create it with: cp {{.vault_file | dir}}/vault.sops.yaml.example {{.vault_file}} && task secrets:edit"
          FAILED=1
        elif ! grep -q "^sops:" "{{.vault_file}}"; then
          echo "[FAIL] {{.vault_file}} is not SOPS-encrypted (missing 'sops:' marker)"
          echo "       Fix: run: sops -e -i {{.vault_file}}"
          FAILED=1
        else
          echo "[OK]   vault.sops.yaml exists and appears encrypted"
        fi

        # Try to decrypt vault
        if [ -f "{{.vault_file}}" ] && grep -q "^sops:" "{{.vault_file}}" && [ -f "{{.age_key_file}}" ]; then
          if SOPS_AGE_KEY_FILE="{{.age_key_file}}" sops -d "{{.vault_file}}" >/dev/null 2>&1; then
            echo "[OK]   vault decrypts successfully"
            # Check at least one expected field
            FIELD=$(SOPS_AGE_KEY_FILE="{{.age_key_file}}" sops -d "{{.vault_file}}" | yq '.registry_port // .nexus_docker_port // .github_org' 2>/dev/null)
            if [ -z "$FIELD" ] || [ "$FIELD" = "null" ]; then
              echo "[WARN] vault does not contain expected fields — vault may be empty or malformed"
            else
              echo "[OK]   vault contains expected fields"
            fi
          else
            echo "[FAIL] vault failed to decrypt"
            echo "       Fix: ensure your age key matches the key used to encrypt the vault"
            FAILED=1
          fi
        fi

        echo ""
        if [ "$FAILED" -eq 0 ]; then
          echo "All checks passed."
        else
          echo "Some checks failed. Fix the issues above before running 'task install'."
          exit 1
        fi

  edit:
    desc: "Edit vault.sops.yaml (SOPS decrypts/re-encrypts on save)"
    vars:
      vault_file: '{{.vault_file | default (printf "%s/.score-task/vault.sops.yaml" .HOME)}}'
      age_key_file: '{{.age_key_file | default (printf "%s/.config/sops/age/keys.txt" .HOME)}}'
    cmds:
      - task: check-key
      - SOPS_AGE_KEY_FILE="{{.age_key_file}}" sops "{{.vault_file}}"

  envgen:
    desc: "Decrypt vault and write ~/.score-task/.env with build platform vars"
    vars:
      vault_file: '{{.vault_file | default (printf "%s/.score-task/vault.sops.yaml" .HOME)}}'
      age_key_file: '{{.age_key_file | default (printf "%s/.config/sops/age/keys.txt" .HOME)}}'
      env_file: '{{.env_file | default (printf "%s/.score-task/.env" .HOME)}}'
    cmds:
      - task: check-key
      - |
        DECRYPTED=$(SOPS_AGE_KEY_FILE="{{.age_key_file}}" sops -d "{{.vault_file}}")

        REGISTRY_PORT=$(echo "$DECRYPTED" | yq '.registry_port // .nexus_docker_port')
        GITHUB_ORG=$(echo "$DECRYPTED" | yq '.github_org')
        RUNNER_TOKEN=$(echo "$DECRYPTED" | yq '.runner_token')

        cat > "{{.env_file}}" <<EOF
        REGISTRY_PORT=${REGISTRY_PORT}
        GITHUB_ORG=${GITHUB_ORG}
        RUNNER_TOKEN=${RUNNER_TOKEN}
        SOPS_AGE_KEY_FILE={{.age_key_file}}
        EOF

        echo "Wrote {{.env_file}}"

  keygen:
    desc: "Generate a new age key at ~/.config/sops/age/keys.txt"
    vars:
      age_key_file: '{{.age_key_file | default (printf "%s/.config/sops/age/keys.txt" .HOME)}}'
      age_key_dir: '{{.age_key_dir | default (printf "%s/.config/sops/age" .HOME)}}'
    cmds:
      - mkdir -p "{{.age_key_dir}}"
      - |
        if [ -f "{{.age_key_file}}" ]; then
          echo "WARNING: age key already exists at {{.age_key_file}}"
          echo "If you proceed, the existing key will be overwritten and you will lose access to anything encrypted with the old key."
          echo "Press Ctrl-C to abort, or Enter to continue."
          read _confirm
        fi
      - age-keygen -o "{{.age_key_file}}"
      - chmod 600 "{{.age_key_file}}"
      - |
        echo ""
        echo "New age key written to {{.age_key_file}}"
        echo ""
        echo "Public key:"
        grep "^# public key:" "{{.age_key_file}}" | awk '{print $NF}'
        echo ""
        echo "Next steps:"
        echo "  1. Update .sops.yaml with the public key above"
        echo "  2. If re-keying: on a machine with the OLD key, run: sops updatekeys vault.sops.yaml"
        echo "  3. Commit the updated .sops.yaml and vault.sops.yaml"

  init-with-own-key:
    desc: "Wire up existing age key: patch .sops.yaml and create encrypted vault from example"
    vars:
      age_key_file: '{{.age_key_file | default (printf "%s/.config/sops/age/keys.txt" .HOME)}}'
      sops_config: '{{.sops_config | default (printf "%s/.score-task/.sops.yaml" .HOME)}}'
      vault_file: '{{.vault_file | default (printf "%s/.score-task/vault.sops.yaml" .HOME)}}'
      vault_example: '{{.vault_example | default (printf "%s/.score-task/vault.sops.yaml.example" .HOME)}}'
    preconditions:
      - sh: test -f "{{.age_key_file}}"
        msg: "age private key not found at {{.age_key_file}}. Restore from backup or run: task secrets:keygen"
      - sh: test -f "{{.sops_config}}"
        msg: ".sops.yaml not found at {{.sops_config}}"
      - sh: test -f "{{.vault_example}}"
        msg: "vault example not found at {{.vault_example}}"
    cmds:
      - |
        # Patch .sops.yaml with existing public key
        PUBLIC_KEY=$(grep "^# public key:" "{{.age_key_file}}" | awk '{print $NF}')
        if [ -z "$PUBLIC_KEY" ]; then
          echo "ERROR: could not extract public key from {{.age_key_file}}"
          exit 1
        fi
        echo "Found public key: ${PUBLIC_KEY}"
        sed -i '' "s|age1REPLACEME|${PUBLIC_KEY}|g" "{{.sops_config}}"
        echo "Patched {{.sops_config}}"
      - |
        # Create vault from example if it doesn't already exist
        if [ -f "{{.vault_file}}" ]; then
          echo "{{.vault_file}} already exists — skipping copy"
        else
          cp "{{.vault_example}}" "{{.vault_file}}"
          echo "Copied example to {{.vault_file}}"
        fi
      - |
        # Encrypt the vault if not already encrypted
        if grep -q "^sops:" "{{.vault_file}}"; then
          echo "{{.vault_file}} is already encrypted — skipping"
        else
          SOPS_AGE_KEY_FILE="{{.age_key_file}}" sops -e -i "{{.vault_file}}"
          echo "Encrypted {{.vault_file}}"
        fi
      - |
        echo ""
        echo "Done. Edit your secrets with:"
        echo "  task secrets:edit"
        echo "Then generate .env with:"
        echo "  task secrets:envgen"

  check-key:
    desc: "Precondition: verify age private key is present"
    vars:
      age_key_file: '{{.age_key_file | default (printf "%s/.config/sops/age/keys.txt" .HOME)}}'
    preconditions:
      - sh: test -f "{{.age_key_file}}"
        msg: "age private key not found at {{.age_key_file}}. Restore from backup or run: task secrets:keygen"
    cmds:
      - echo "age key present at {{.age_key_file}}"
